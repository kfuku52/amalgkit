name: Create GitHub Release from __version__

on:
  workflow_run:
    workflows: [Tests]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: false

jobs:
  release:
    if: >-
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/master') ||
      (github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'master')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code and tags
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Read and validate package version
        id: package
        shell: bash
        run: |
          VERSION=$(python - <<'PY'
          import ast
          import pathlib
          import re

          init_path = pathlib.Path('amalgkit/__init__.py')
          tree = ast.parse(init_path.read_text(encoding='utf-8'), filename=str(init_path))
          version = None
          for node in tree.body:
              if not isinstance(node, ast.Assign):
                  continue
              if any(isinstance(target, ast.Name) and target.id == '__version__' for target in node.targets):
                  version = ast.literal_eval(node.value)
                  break
          if not isinstance(version, str) or not re.fullmatch(r'\d+\.\d+\.\d+(?:[a-z]+\d+)?', version):
              raise SystemExit('Invalid or missing __version__ in {}'.format(init_path))
          print(version)
          PY
          )
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create version tag
        id: tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          TAG: ${{ steps.package.outputs.tag }}
        run: |
          TARGET_COMMIT=$(git rev-parse HEAD)
          if git rev-parse --verify --quiet "refs/tags/$TAG"; then
            TAGGED_COMMIT=$(git rev-list -n 1 "$TAG")
            if [ "$TAGGED_COMMIT" != "$TARGET_COMMIT" ]; then
              if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
                echo "Tag $TAG already points to $TAGGED_COMMIT, not $TARGET_COMMIT" >&2
                exit 1
              fi
              echo "Version $TAG was already released from $TAGGED_COMMIT; nothing to do."
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag --annotate "$TAG" --message "Release $TAG"
            git push origin "$TAG"
          fi

      - name: Create GitHub Release if missing
        if: steps.tag.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.package.outputs.tag }}
        run: |
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --verify-tag --generate-notes --title "$TAG"
          fi
